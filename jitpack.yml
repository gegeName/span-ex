# JitPack 服务器构建配置（https://jitpack.io/docs/BUILDING/）
# 放在仓库根目录，JitPack 会读取它来选择 JDK 版本、构建命令等。

jdk:
  - openjdk17

# 默认 install 命令是 ./gradlew clean install，但 Android Library 没有 install 任务。
# 这里显式指定发布到 mavenLocal，并只发布需要的子模块。
# JitPack 会注入 $VERSION 环境变量，把它传给 -PVERSION_NAME 让 jitpack.gradle 取到。
install:
  - ./gradlew
    :glidespan:publishToMavenLocal
    :spanutil:publishToMavenLocal
    :svgspan:publishToMavenLocal
    :svgaspan:publishToMavenLocal
    -PVERSION_NAME=$VERSION

